# PR Preview Environment for MinaGuard
#
# Usage (run from repo root):
#   PR_NUMBER=1 PREVIEW_PORT=10001 docker compose -f preview-env/docker-compose.preview.yml -p pr-1 up -d --build
#   docker compose -p pr-1 down -v
#
# Access: https://mina-nodes.duckdns.org/preview/<PR_NUMBER>/

services:
  lightnet:
    # Mesa (develop-3.0) binary — required because MinaGuard now uses 11
    # on-chain state slots, which exceeds the 8-slot cap of the older
    # compatible-latest protocol. Floating tag; pin to a digest once a
    # known-good one is identified.
    image: o1labs/mina-local-network:mesa-latest-lightnet
    restart: unless-stopped
    environment:
      - SLOT_TIME=5000
      - PROOF_LEVEL=none
      - RUN_ARCHIVE_NODE=true
      - NETWORK_TYPE=single-node
      - LOG_LEVEL=Info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{ syncStatus }\"}' http://localhost:8080/graphql && curl -sf -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{ networkState { maxBlockHeight { pendingMaxBlockHeight } } }\"}' http://localhost:8282"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=minaguard
      - POSTGRES_PASSWORD=minaguard
      - POSTGRES_DB=minaguard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minaguard"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: preview-env/Dockerfile.backend
      args:
        # When set, the Dockerfile skips the in-image circuit compile and
        # writes this value to /app/.vk-hash. preview.sh computes it once on
        # the host before invoking compose build to avoid OOM kills inside
        # the Docker build.
        - MINAGUARD_VK_HASH=${MINAGUARD_VK_HASH:-}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://minaguard:minaguard@db:5432/minaguard
      - MINA_ENDPOINT=http://lightnet:8080/graphql
      - ARCHIVE_ENDPOINT=http://lightnet:8282
      - LIGHTNET_ACCOUNT_MANAGER=http://lightnet:8181
      - PORT=4000
      # Lightnet's slot time is ~10s; default 15s indexer poll is wasteful here.
      # Drop to 5s so the UI sees fresh events ~3x sooner. Backed by
      # config.ts:56 (INDEX_POLL_INTERVAL_MS).
      - INDEX_POLL_INTERVAL_MS=5000
    depends_on:
      lightnet:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: preview-env/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_BASE_PATH=/preview/${PR_NUMBER:-1}
        - NEXT_PUBLIC_API_BASE_URL=https://mina-nodes.duckdns.org/preview/${PR_NUMBER:-1}
        - NEXT_PUBLIC_MINA_ENDPOINT=https://mina-nodes.duckdns.org/preview/${PR_NUMBER:-1}/graphql
        - NEXT_PUBLIC_ARCHIVE_ENDPOINT=https://mina-nodes.duckdns.org/preview/${PR_NUMBER:-1}/archive
        - NEXT_PUBLIC_MINA_NETWORK=testnet
        - NEXT_PUBLIC_BLOCK_EXPLORER_URL=https://mina-nodes.duckdns.org/preview/${PR_NUMBER:-1}/explorer
        # Idle poll cadence on the preview; adaptive polling drops to a faster
        # interval automatically while a PendingTx is in flight.
        - NEXT_PUBLIC_POLL_INTERVAL_MS=3000
    restart: unless-stopped
    depends_on:
      - backend

  explorer:
    build:
      context: .
      dockerfile: Dockerfile.explorer
      args:
        - NEXT_PUBLIC_BASE_PATH=/preview/${PR_NUMBER:-1}/explorer
        - TESTNET_GRAPHQL_URL=http://lightnet:8080/graphql
    restart: unless-stopped
    depends_on:
      lightnet:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      - PR_NUMBER=${PR_NUMBER:-1}
    ports:
      - "${PREVIEW_PORT:-10001}:80"
    volumes:
      - ./Caddyfile.preview:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
      - explorer
      - lightnet
