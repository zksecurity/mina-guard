name: E2E tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mina-local-network:
        image: o1labs/mina-local-network:compatible-latest-lightnet
        env:
          NETWORK_TYPE: 'single-node'
          PROOF_LEVEL: 'none'
          LOG_LEVEL: 'Info'
        ports:
          - 3085:3085
          - 5432:5432
          - 8080:8080
          - 8181:8181
          - 8282:8282
        volumes:
          - /tmp:/root/logs

    steps:
      - name: Wait for Mina network readiness
        uses: o1-labs/wait-for-mina-network-action@v1
        with:
          mina-graphql-port: 3085
          max-attempts: 120
          polling-interval-ms: 10000

      - name: Debug container status
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo ""
          echo "=== Mina container logs (last 100 lines) ==="
          docker logs $(docker ps -aq --filter "ancestor=o1labs/mina-local-network:compatible-latest-lightnet") 2>&1 | tail -100

      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build contracts
        run: bun run --filter contracts build

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Reset database
        run: bunx prisma db push
        working-directory: backend
        env:
          DATABASE_URL: file:./dev.db

      - name: Start backend
        run: bun run --filter backend dev &
        env:
          PORT: '4000'
          DATABASE_URL: file:./dev.db
          MINA_ENDPOINT: http://localhost:8080/graphql
          ARCHIVE_ENDPOINT: http://localhost:8282
          LIGHTNET_ACCOUNT_MANAGER: http://localhost:8181
          INDEX_POLL_INTERVAL_MS: '5000'

      - name: Start frontend
        run: bun run --filter ui dev &
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          NEXT_PUBLIC_MINA_ENDPOINT: http://localhost:8080/graphql
          NEXT_PUBLIC_ARCHIVE_ENDPOINT: http://localhost:8282

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:4000/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'
          echo "Services ready"

      - name: Run e2e tests
        run: cd e2e && node node_modules/@playwright/test/cli.js test
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

      - name: Upload Mina logs
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: failure()
        with:
          if-no-files-found: ignore
          name: mina-logs
          path: /tmp/*.log
          retention-days: 5
