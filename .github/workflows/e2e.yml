name: E2E tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: [self-hosted, e2e]

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # The self-hosted e2e runner has Docker Engine but not the Compose v2
      # plugin (`docker compose`), so every compose step below fails with
      # "unknown shorthand flag: 'f'". The official action installs the plugin
      # into the runner's CLI plugin dir (handles arch/caching/integrity).
      - name: Ensure Docker Compose v2
        uses: docker/setup-compose-action@v1
        with:
          version: v2.29.7

      - name: Clean up previous run
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e down -v --remove-orphans 2>/dev/null || true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Start compose stack
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e up -d --build --wait --wait-timeout 600
        env:
          MINAGUARD_VK_HASH: "skip"

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:4000/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'
          echo "Services ready"

      - name: Run e2e tests
        run: cd e2e && node node_modules/@playwright/test/cli.js test
        env:
          CI: true
          TMPDIR: ${{ github.workspace }}/.tmp

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

      - name: Collect container logs
        if: failure()
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e logs --tail=200 > /tmp/compose-e2e-logs.txt 2>&1 || true

      - name: Upload container logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-e2e-logs
          path: /tmp/compose-e2e-logs.txt
          retention-days: 5

      - name: Teardown compose stack
        if: always()
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e down -v --remove-orphans
