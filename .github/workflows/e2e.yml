name: E2E tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: e2e-runner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: [self-hosted, e2e]
    # Host-wide lock. The workflow-level concurrency above still cancels
    # superseded commits on the same ref; this job-level group additionally
    # serialises the e2e stack against the deploy-lightnet runner's heavy jobs
    # (deploy-lightnet.yml, preview-deploy.yml) sharing this 15 GB box, so two
    # Mina stacks never run at once. cancel-in-progress:false → queue, don't
    # kill an in-flight deploy/preview.
    concurrency:
      group: minaguard-host
      cancel-in-progress: false

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # Runner is expected to have `docker compose` v2 pre-installed
      # system-wide (`/usr/libexec/docker/cli-plugins/docker-compose`). We
      # used to install it here via docker/setup-compose-action@v1, but that
      # action copies the binary to `~/.docker/cli-plugins/docker-compose`
      # — a per-user path shared between both runners on this box
      # (deploy-runner and e2e-runner both run as jason). When a concurrent
      # `docker compose` invocation is executing on the other runner, the
      # copy fails with ETXTBSY (text file busy). See CI failure 2026-07-16.
      - name: Verify Docker Compose v2 available
        run: docker compose version

      - name: Clean up previous run
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e down -v --remove-orphans 2>/dev/null || true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Start compose stack
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e up -d --build --wait --wait-timeout 600
        env:
          MINAGUARD_VK_HASH: "skip"

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:14000/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 120 bash -c 'until curl -sf http://localhost:13000; do sleep 2; done'
          echo "Services ready"

      - name: Run e2e tests
        run: cd e2e && node node_modules/@playwright/test/cli.js test
        env:
          CI: true
          TMPDIR: ${{ github.workspace }}/.tmp
          # Point the harness at the isolated host ports published by
          # docker-compose.e2e-ci.yml (1xxxx range avoids runner collisions).
          E2E_MINA_ENDPOINT: http://127.0.0.1:18080/graphql
          E2E_ARCHIVE_ENDPOINT: http://127.0.0.1:18282
          E2E_ACCOUNT_MANAGER: http://127.0.0.1:18181
          E2E_BACKEND_URL: http://localhost:14000
          E2E_FRONTEND_URL: http://localhost:13000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

      - name: Collect container logs
        if: failure()
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e logs --tail=200 > /tmp/compose-e2e-logs.txt 2>&1 || true

      - name: Upload container logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-e2e-logs
          path: /tmp/compose-e2e-logs.txt
          retention-days: 5

      - name: Teardown compose stack
        if: always()
        run: docker compose -f preview-env/docker-compose.e2e-ci.yml -p mina-guard-e2e down -v --remove-orphans
