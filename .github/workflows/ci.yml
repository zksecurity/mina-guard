name: zkApp tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: minaguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      #
      # Enable the following block if you also want to use the Lightnet in your tests.
      #
      # - name: Wait for Mina network readiness
      #   uses: o1-labs/wait-for-mina-network-action@v1
      #   with:
      #     mina-graphql-port: 8080
      #     max-attempts: 60
      #     polling-interval-ms: 10000

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install dependencies
        run: bun install
      - name: Build contracts
        run: bun run --filter contracts build
      - name: Build UI
        run: bun run --filter ui build
      - name: Generate Prisma client
        run: cd backend && bunx prisma generate
      - name: Build backend
        run: bun run --filter backend build
      - name: Run backend tests
        run: cd backend && bunx prisma db push --skip-generate && bun test
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/minaguard
      - name: Run contract tests
        run: bun run test
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/minaguard
      - name: Run offline-cli tests
        run: cd offline-cli && bun test
        env:
          SKIP_PROOFS: '1'
      - name: Build offline-cli binary (linux-x64)
        run: cd offline-cli && bun build --compile --target=bun-linux-x64 src/index.ts --outfile dist/mina-guard-cli-linux-x64 --define 'process.versions.node=""'
      - name: Smoke-test compiled binary (WASM loads without error)
        run: |
          output=$(offline-cli/dist/mina-guard-cli-linux-x64 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "Usage:" || (echo "ERROR: binary did not print usage — WASM may have failed to load" && exit 1)

  test-offline-cli-macos:
    timeout-minutes: 45
    runs-on: macos-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Build mina-signer
        working-directory: ui/deps/o1js/src/mina-signer
        run: bunx esbuild --bundle --minify mina-signer.ts --outfile=./dist/web/index.js --format=esm --target=es2021 --platform=browser --external:crypto --external:@noble/hashes/* --external:blakejs --external:js-sha256
      - name: Build contracts
        run: bun run --filter contracts build
      - name: Run offline-cli unit tests
        working-directory: offline-cli
        run: bun test src/tests/offline-cli.test.ts
      - name: Run offline-cli e2e test (with proofs)
        working-directory: offline-cli
        run: bun test src/tests/offline-cli-e2e.test.ts --test-name-pattern "propose"
        timeout-minutes: 20
      - name: Build offline-cli binary (darwin-arm64)
        working-directory: offline-cli
        run: bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile dist/mina-guard-cli-darwin-arm64 --define 'process.versions.node=""'
      - name: Code-sign binary (JIT entitlement required for WASM)
        working-directory: offline-cli
        run: |
          cat > /tmp/entitlements.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
          </dict>
          </plist>
          PLIST
          codesign -s - --force --entitlements /tmp/entitlements.plist dist/mina-guard-cli-darwin-arm64
      - name: Smoke-test compiled binary (WASM loads without error)
        working-directory: offline-cli
        run: |
          output=$(./dist/mina-guard-cli-darwin-arm64 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "Usage:" || (echo "ERROR: binary did not print usage — WASM may have failed to load" && exit 1)

  # Verifies contracts/.vk-hash semantically: when VK-affecting paths change,
  # compile MinaGuard and compare the real VK hash against the committed file.
  # Cosmetic contract edits (imports, comments, formatting) that don't alter
  # the circuit pass without requiring a .vk-hash bump; genuine drift fails
  # even if .vk-hash was updated (to the wrong value). The diff detection only
  # decides whether to spend the compile minutes.
  check-vk-hash:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Detect VK-affecting changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # Skip on initial push (before SHA is all-zeros)
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push — skipping VK hash check."
            echo "verify=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Force-pushes can make BASE unresolvable; verify unconditionally then.
          if ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "Base commit $BASE not available locally — verifying VK hash to be safe."
            echo "verify=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SRC_CHANGED=$(git diff --name-only "$BASE"...HEAD -- contracts/src/ || true)
          O1JS_CHANGED=$(git diff "$BASE"...HEAD -- bun.lock | grep '^[+-].*"o1js@' | grep -v '^---\|^+++' || true)
          HASH_CHANGED=$(git diff --name-only "$BASE"...HEAD -- contracts/.vk-hash || true)

          TRIGGER=""
          [ -n "$SRC_CHANGED" ] && TRIGGER="contracts/src changed"
          [ -n "$O1JS_CHANGED" ] && TRIGGER="${TRIGGER:+$TRIGGER; }o1js version changed in bun.lock"
          [ -n "$HASH_CHANGED" ] && TRIGGER="${TRIGGER:+$TRIGGER; }contracts/.vk-hash changed"

          if [ -n "$TRIGGER" ]; then
            echo "$TRIGGER — will compile and compare against contracts/.vk-hash."
            echo "verify=true" >> "$GITHUB_OUTPUT"
          else
            echo "No VK-affecting changes — skipping compile."
            echo "verify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Bun
        if: steps.detect.outputs.verify == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.detect.outputs.verify == 'true'
        run: bun install --ignore-scripts

      - name: Compile contracts and compare VK hashes (testnet + mainnet)
        if: steps.detect.outputs.verify == 'true'
        run: |
          # Pre-build once so the dev-helpers CLI's static imports resolve.
          # The tsc output is network-independent; MINA_NETWORK_DOMAIN is
          # evaluated at JS runtime when constants.js is imported.
          bun run --filter contracts build

          check_hash() {
            local network="$1"
            local env_prefix="$2"   # empty string or "MINA_NETWORK_DOMAIN=mainnet "
            local log="vk-${network}.log"

            eval "${env_prefix}bun run dev-helpers/cli.ts vk-hash compile" 2>&1 | tee "$log"
            local computed
            computed=$(grep "^vkHash\[${network}\]: " "$log" | tail -1 | awk '{print $2}' || true)
            local committed
            committed=$(grep "^${network}=" contracts/.vk-hash | cut -d= -f2 | tr -d '[:space:]')

            echo "${network} computed:  ${computed:-<none>}"
            echo "${network} committed: ${committed:-<none>}"

            if [ -z "$computed" ]; then
              echo "::error::Could not extract ${network} VK hash from 'vk-hash compile' output."
              return 1
            fi
            if [ -z "$committed" ]; then
              echo "::error::contracts/.vk-hash is missing a '${network}=' line."
              echo "Add: ${network}=${computed}"
              return 1
            fi
            if [ "$computed" != "$committed" ]; then
              echo "::error::contracts/.vk-hash ${network} hash is stale: computed ${computed} but committed ${committed}."
              echo "Regenerate: ${env_prefix}bun run dev-helpers/cli.ts vk-hash compile — then update ${network}= in contracts/.vk-hash."
              return 1
            fi
            echo "${network} VK hash matches."
          }

          FAIL=0
          check_hash testnet "" || FAIL=1
          check_hash mainnet "MINA_NETWORK_DOMAIN=mainnet " || FAIL=1
          exit $FAIL

  test-offline-cli-windows:
    timeout-minutes: 45
    runs-on: windows-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Build mina-signer
        working-directory: ui/deps/o1js/src/mina-signer
        run: bunx esbuild --bundle --minify mina-signer.ts --outfile=./dist/web/index.js --format=esm --target=es2021 --platform=browser --external:crypto --external:@noble/hashes/* --external:blakejs --external:js-sha256
      - name: Build contracts
        run: bun run --filter contracts build
      - name: Run offline-cli unit tests
        working-directory: offline-cli
        run: bun test src/tests/offline-cli.test.ts
      - name: Run offline-cli e2e test (with proofs)
        working-directory: offline-cli
        run: bun test src/tests/offline-cli-e2e.test.ts --test-name-pattern "propose"
        timeout-minutes: 20
      - name: Build offline-cli binary (win32-x64)
        working-directory: offline-cli
        run: bun build --compile --target=bun-win32-x64 src/index.ts --outfile dist/mina-guard-cli-win32-x64 --define 'process.versions.node=""'
      - name: Smoke-test compiled binary (WASM loads without error)
        working-directory: offline-cli
        shell: bash
        run: |
          output=$(./dist/mina-guard-cli-win32-x64.exe 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "Usage:" || (echo "ERROR: binary did not print usage — WASM may have failed to load" && exit 1)
