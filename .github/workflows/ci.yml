name: zkApp tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: minaguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      #
      # Enable the following block if you also want to use the Lightnet in your tests.
      #
      # - name: Wait for Mina network readiness
      #   uses: o1-labs/wait-for-mina-network-action@v1
      #   with:
      #     mina-graphql-port: 8080
      #     max-attempts: 60
      #     polling-interval-ms: 10000

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install dependencies
        run: bun install
      - name: Build contracts
        run: bun run --filter contracts build
      - name: Build UI
        run: bun run --filter ui build
      - name: Generate Prisma client
        run: cd backend && bunx prisma generate
      - name: Build backend
        run: bun run --filter backend build
      - name: Run contract tests
        run: bun run test
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/minaguard
      - name: Run offline-cli tests
        run: cd offline-cli && bun test
        env:
          SKIP_PROOFS: '1'
      - name: Build offline-cli binary
        run: cd offline-cli && bun build --compile --target=bun-linux-x64 src/index.ts --outfile dist/mina-guard-cli-linux-x64 --define 'process.versions.node=""'

  test-offline-cli-windows:
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Build mina-signer
        working-directory: ui/deps/o1js/src/mina-signer
        run: bunx esbuild --bundle --minify mina-signer.ts --outfile=./dist/web/index.js --format=esm --target=es2021 --platform=browser --external:crypto --external:@noble/hashes/* --external:blakejs --external:js-sha256
      - name: Build contracts
        run: bun run --filter contracts build
      - name: Run offline-cli tests
        working-directory: offline-cli
        run: bun test
        env:
          SKIP_PROOFS: '1'

      # Enable the following block if you also want to use the Lightnet in your tests.
      #
      # - name: Upload Mina logs
      #   uses: actions/upload-artifact@v4
      #   continue-on-error: true
      #   if: always()
      #   with:
      #     if-no-files-found: ignore
      #     name: mina-logs-node${{ matrix.node }}-${{ matrix.os }}
      #     path: /tmp/*.log
      #     retention-days: 5
