name: zkApp tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: minaguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      #
      # Enable the following block if you also want to use the Lightnet in your tests.
      #
      # - name: Wait for Mina network readiness
      #   uses: o1-labs/wait-for-mina-network-action@v1
      #   with:
      #     mina-graphql-port: 8080
      #     max-attempts: 60
      #     polling-interval-ms: 10000

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install dependencies
        run: bun install
      - name: Build contracts
        run: bun run --filter contracts build
      - name: Build UI
        run: bun run --filter ui build
      - name: Run contract tests
        run: bun run test
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/minaguard

      # Enable the following block if you also want to use the Lightnet in your tests.
      #
      # - name: Upload Mina logs
      #   uses: actions/upload-artifact@v4
