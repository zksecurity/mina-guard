name: Deploy lightnet (/app)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, deploy-lightnet]
    # Host-wide lock: this box (15 GB / 8 cores) also runs the e2e stack on a
    # second runner. Two heavy Mina stacks at once thrash swap and starve o1js
    # proving. This job-level group serialises against e2e.yml and
    # preview-deploy.yml so only one heavy stack runs on the host at a time.
    # cancel-in-progress:false → queue rather than kill an unrelated run.
    concurrency:
      group: minaguard-host
      cancel-in-progress: false
    steps:
      - name: Verify branch is main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Refusing to deploy from ${{ github.ref }}. This workflow only runs on main."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy
        # `down` wipes volumes before `up` rebuilds the stack. Without the
        # `down`, `up --force-recreate` spins up a fresh lightnet (no volume
        # → genesis chain) while the app DB keeps its old IndexerCursor and
        # EventRaw rows — the indexer ends up pointing at a dead chain.
        run: |
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh down
          ./deploy/deploy.sh up

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 36); do
            if curl -sf "http://localhost:10000/app/health" > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i/36: not ready yet..."
            sleep 5
          done
          echo "Backend failed to become ready within timeout"
          exit 1
